# Deploy: Angular static site -> Azure Storage ($web) + zip -> Azure Function (submit-contact).
#
# Secrets (repository): AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Set up federated credentials: App registration -> Certificates & secrets -> Federated credential
#   Subject: repo:<owner>/<repo>:ref:refs/heads/main  (and workflow_dispatch if needed)
# RBAC for the SP: Contributor on rg-control-crest-prod (or narrower: Function Contributor + Storage Blob Data Contributor on the storage account).
#
# Optional secrets for production build: GOOGLE_PLACES_API_KEY, CONTACT_PHONE (replace placeholders in environment.ts)

name: Deploy Control Crest

on:
  push:
    branches: [main, master]
    paths:
      - 'LandingPage/**'
      - 'AzureFunctions/**'
      - '.github/workflows/deploy-controlcrest.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'LandingPage/**'
      - 'AzureFunctions/**'
      - '.github/workflows/deploy-controlcrest.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-control-crest-prod
  AZURE_STORAGE_ACCOUNT: stcce78f20af4fb
  AZURE_FUNCTIONAPP_NAME: func-cc-5c7775b3cf
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: LandingPage/package-lock.json

      - name: Patch environment.ts from secrets (optional)
        working-directory: LandingPage
        env:
          GOOGLE_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          PHONE: ${{ secrets.CONTACT_PHONE }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'src/environments/environment.ts';
          let s = fs.readFileSync(p, 'utf8');
          const k = process.env.GOOGLE_KEY || '';
          const ph = process.env.PHONE || '';
          if (k) s = s.split('YOUR_GOOGLE_PLACES_API_KEY').join(k);
          if (ph) s = s.split('YOUR_PHONE').join(ph);
          fs.writeFileSync(p, s);
          NODE

      - name: Install and build Angular (production)
        working-directory: LandingPage
        run: |
          npm ci
          npx ng build --configuration=production

      - name: Install Function dependencies and create zip
        working-directory: AzureFunctions/SubmitContact
        run: |
          mkdir -p "$GITHUB_WORKSPACE/temp"
          npm ci --omit=dev
          zip -r "$GITHUB_WORKSPACE/temp/func.zip" host.json package.json package-lock.json node_modules SubmitContact

      - name: Azure Login (OIDC)
        if: github.event_name != 'pull_request'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Runtime + extensão: sem isso o host pode não carregar funções Node (404 em /api/...).
      - name: Function App — runtime Node (idempotente)
        if: github.event_name != 'pull_request'
        run: |
          set -e
          az functionapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --settings \
              FUNCTIONS_WORKER_RUNTIME=node \
              WEBSITE_NODE_DEFAULT_VERSION=~20 \
              FUNCTIONS_EXTENSION_VERSION=~4 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false

      - name: Deploy Function (zip)
        if: github.event_name != 'pull_request'
        run: |
          set -e
          # --build-remote false: zip já traz node_modules; build remoto quebra ou ignora o layout.
          az functionapp deployment source config-zip \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --src "$GITHUB_WORKSPACE/temp/func.zip" \
            --build-remote false
          az functionapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME"

      - name: Upload static site to Storage ($web)
        if: github.event_name != 'pull_request'
        run: |
          set -e
          CONN=$(az storage account show-connection-string \
            --name "$AZURE_STORAGE_ACCOUNT" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query connectionString -o tsv)
          az storage blob upload-batch \
            --connection-string "$CONN" \
            --destination '$web' \
            --source "$GITHUB_WORKSPACE/LandingPage/dist/landing-page-ng/browser" \
            --overwrite

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          WEB=$(az storage account show --name "$AZURE_STORAGE_ACCOUNT" --resource-group "$AZURE_RESOURCE_GROUP" --query primaryEndpoints.web -o tsv)
          echo "Static: $WEB"
          echo "API:    https://${AZURE_FUNCTIONAPP_NAME}.azurewebsites.net/api/submit-contact"
